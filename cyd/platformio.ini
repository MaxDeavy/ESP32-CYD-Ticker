; PlatformIO – aus dem cyd/ Ordner: pio run -t upload
; lv_conf.h und User_Setup.h liegen im gleichen Ordner – nichts kopieren.

[platformio]
default_envs = cyd

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_size = 4MB
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -D USER_SETUP_LOADED
  -I ${PROJECT_DIR}
lib_deps =
  lvgl/lvgl@^8.4.0
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.2.0
  paulstoffregen/XPT2046_Touchscreen@^1.4
build_src_filter =
  +<cyd.ino>
  +<lv_font_price_28.c>
  +<lv_font_price_28.h>
  -<test/>
  -<fonts/>
