# Erzeugen: ./generate-nginx.sh  |  .\generate-nginx.ps1
# Installieren: siehe README (sites-available â†’ sites-enabled â†’ nginx -t)

server {
    listen 80;
    listen [::]:80;
    server_name kurse.example.com;

    # Cloudflare Flexible SSL: Origin oft nur HTTP (Port 80). Bei Full SSL auch 443 + Zertifikat.
    location / {
        proxy_pass http://127.0.0.1:4546;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
