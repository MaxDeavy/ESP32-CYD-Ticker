<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CYD Ticker</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --up: #3fb950;
      --down: #f85149;
      --flat: #8b949e;
      --accent: #58a6ff;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      background: var(--bg);
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.35;
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh;
      padding: max(12px, env(safe-area-inset-top)) 12px calc(16px + var(--safe-bottom));
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 14px;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--flat);
      flex-shrink: 0;
    }

    .dot.live { background: var(--up); box-shadow: 0 0 6px var(--up); }

    section {
      margin-bottom: 18px;
    }

    section h2 {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto 72px;
      grid-template-rows: auto auto;
      gap: 2px 10px;
      align-items: center;
      margin-bottom: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s ease;
    }

    .card:active {
      border-color: var(--accent);
    }

    .card:last-child { margin-bottom: 0; }

    .period-badge {
      font-size: 0.75rem;
      color: var(--text);
      font-weight: 500;
    }

    .name {
      font-weight: 600;
      font-size: 0.9rem;
      grid-column: 1;
      grid-row: 1;
    }

    .ticker {
      font-size: 0.65rem;
      color: var(--muted);
      grid-column: 1;
      grid-row: 2;
    }

    .price-block {
      text-align: right;
      grid-column: 2;
      grid-row: 1 / 3;
    }

    .price {
      font-size: 0.95rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .chg {
      font-size: 0.72rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .chg.up { color: var(--up); }
    .chg.down { color: var(--down); }
    .chg.flat { color: var(--flat); }

    .spark {
      grid-column: 3;
      grid-row: 1 / 3;
      width: 72px;
      height: 36px;
      border-radius: 6px;
      background: #0d1117;
      display: block;
    }

    .card.missing {
      opacity: 0.55;
    }

    .card.missing .price { color: var(--muted); }

    .banner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .banner.error { border-color: var(--down); color: var(--down); }

    footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      padding-bottom: 4px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .dot.live { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Kurse</h1>
      <p>CYD Ticker · alle Werte in EUR · Tippen = Zeitraum</p>
      <p class="period-badge">Ansicht: <span id="periodLabel">Live</span></p>
      <div class="status" id="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Lade …</span>
      </div>
    </header>
    <main id="main">
      <div class="banner">Kurse werden geladen …</div>
    </main>
    <footer>
      Live · 14 Tage · 30 Tage · 1 Jahr · Aktualisierung alle <span id="refreshSec">60</span> s ·
      <a href="/api/quotes">JSON</a>
    </footer>
  </div>

  <script>
    /** Web: je eine Sektion pro Kategorie (Krypto/ETFs/Aktien). ESP nutzt weiter data.pages (2×2). */
    let webSections = [];

    const PERIODS = [
      { key: "live", label: "Live" },
      { key: "y1", label: "1 Jahr" },
      { key: "d30", label: "30 Tage" },
      { key: "d14", label: "14 Tage" },
    ];

    let refreshMs = 60000;
    let timer = null;
    let statPeriodIdx = 0;
    let lastQuoteData = null;

    function cycleStatPeriod() {
      statPeriodIdx = (statPeriodIdx + 1) % PERIODS.length;
      const label = document.getElementById("periodLabel");
      if (label) label.textContent = PERIODS[statPeriodIdx].label;
      if (lastQuoteData) render(lastQuoteData);
    }

    function periodView(asset) {
      const key = PERIODS[statPeriodIdx].key;
      const block = asset.periods?.[key];
      if (block && block.sparkline?.length >= 2) {
        return {
          sparkline: block.sparkline,
          change_pct: block.change_pct ?? 0,
        };
      }
      return {
        sparkline: asset.sparkline || [],
        change_pct: asset.change_pct ?? 0,
      };
    }

    function formatPrice(v) {
      if (v >= 1000) return v.toLocaleString("de-DE", { maximumFractionDigits: 0 }) + " €";
      if (v >= 1) return v.toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
      return v.toLocaleString("de-DE", { minimumFractionDigits: 4, maximumFractionDigits: 4 }) + " €";
    }

    function chgClass(pct) {
      if (pct > 0.005) return "up";
      if (pct < -0.005) return "down";
      return "flat";
    }

    function drawSparkline(canvas, points, colorUp, colorDown, lastPct) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const cw = rect.width;
      const ch = rect.height;
      canvas.width = Math.round(cw * dpr);
      canvas.height = Math.round(ch * dpr);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, cw, ch);

      if (!points || points.length < 2) {
        ctx.strokeStyle = "#30363d";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(4, ch / 2);
        ctx.lineTo(cw - 4, ch / 2);
        ctx.stroke();
        return;
      }

      let min = points[0], max = points[0];
      for (const p of points) {
        if (p < min) min = p;
        if (p > max) max = p;
      }
      let span = max - min;
      if (span < 1e-6) span = max * 0.001 + 0.01;

      const pad = 3;
      const color = lastPct >= 0 ? colorUp : colorDown;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.lineJoin = "round";
      ctx.beginPath();
      points.forEach((v, i) => {
        const x = pad + (i / (points.length - 1)) * (cw - pad * 2);
        const y = ch - pad - ((v - min) / span) * (ch - pad * 2);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function buildCard(asset) {
      const id = asset.id;
      const name = asset.name || id;
      const ok = asset.price_eur > 0;
      const view = periodView(asset);
      const pct = view.change_pct;
      const cls = chgClass(pct);
      const sign = pct >= 0 ? "+" : "";

      const card = document.createElement("article");
      card.className = "card" + (ok ? "" : " missing");
      card.dataset.id = id;
      card.setAttribute("role", "button");
      card.setAttribute("tabindex", "0");
      card.setAttribute("aria-label", `${name}, Zeitraum wechseln`);
      card.addEventListener("click", cycleStatPeriod);
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          cycleStatPeriod();
        }
      });

      const spark = document.createElement("canvas");
      spark.className = "spark";
      spark.setAttribute("aria-hidden", "true");

      card.innerHTML = `
        <div class="name">${escapeHtml(name)}</div>
        <div class="ticker">${escapeHtml(asset.yahoo || id)}</div>
        <div class="price-block">
          <div class="price">${ok ? escapeHtml(formatPrice(asset.price_eur)) : "—"}</div>
          <div class="chg ${cls}">${ok ? sign + pct.toFixed(2) + "%" : "keine Daten"}</div>
        </div>
      `;
      card.appendChild(spark);

      if (ok && view.sparkline.length >= 2) {
        requestAnimationFrame(() => {
          drawSparkline(spark, view.sparkline, "#3fb950", "#f85149", pct);
        });
      }

      return card;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function render(data) {
      lastQuoteData = data;
      const label = document.getElementById("periodLabel");
      if (label) label.textContent = PERIODS[statPeriodIdx].label;

      const byId = {};
      (data.assets || []).forEach((a) => { byId[a.id] = a; });

      const main = document.getElementById("main");
      main.innerHTML = "";

      const layout = buildWebSectionsFromQuotes(data);
      for (const sec of layout) {
        const section = document.createElement("section");
        section.innerHTML = `<h2>${escapeHtml(sec.title)}</h2>`;
        for (const id of sec.ids) {
          const asset = byId[id] || { id, name: id, price_eur: 0, change_pct: 0 };
          section.appendChild(buildCard(asset));
        }
        main.appendChild(section);
      }

      const n = (data.assets || []).length;
      const total = data.expected_ids?.length || n;
      const ts = data.updated_at ? new Date(data.updated_at * 1000) : null;
      const timeStr = ts
        ? ts.toLocaleString("de-DE", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })
        : "—";

      document.getElementById("statusDot").className = "dot" + (n >= total ? " live" : "");
      document.getElementById("statusText").textContent =
        `${n}/${total} Kurse · ${timeStr}`;
    }

    async function loadQuotes() {
      try {
        const res = await fetch("/api/quotes", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        render(data);
        document.querySelector(".banner.error")?.remove();
      } catch (e) {
        const main = document.getElementById("main");
        if (!main.querySelector(".card")) {
          main.innerHTML = '<div class="banner error">Kurse nicht erreichbar. Bitte später erneut versuchen.</div>';
        }
        document.getElementById("statusDot").className = "dot";
        document.getElementById("statusText").textContent = "Verbindungsfehler";
        console.error(e);
      }
    }

    /** Fasst ESP-Seiten (2×2) pro category zu einer Web-Sektion zusammen. */
    function buildWebSectionsFromQuotes(data) {
      const order = data.category_order || [];
      const labels = data.categories || {};
      const merged = new Map();

      for (const p of data.pages || []) {
        const cat = p.category || p.title;
        if (!merged.has(cat)) {
          merged.set(cat, { title: labels[cat] || p.title, ids: [] });
        }
        const sec = merged.get(cat);
        for (const id of p.ids || []) {
          if (!sec.ids.includes(id)) sec.ids.push(id);
        }
      }

      if (merged.size) {
        if (order.length) {
          return order
            .filter((cat) => merged.has(cat))
            .map((cat) => merged.get(cat));
        }
        return [...merged.values()];
      }

      return webSections;
    }

    function buildWebSectionsFromConfig(cfg) {
      const order = cfg.category_order || Object.keys(cfg.categories || {});
      const labels = cfg.categories || {};
      const out = [];
      for (const cat of order) {
        const ids = (cfg.assets || [])
          .filter((a) => a.category === cat)
          .map((a) => a.id);
        if (ids.length) out.push({ title: labels[cat] || cat, ids });
      }
      return out;
    }

    async function loadConfig() {
      try {
        const res = await fetch("/api/config", { cache: "no-store" });
        if (!res.ok) return;
        const cfg = await res.json();
        webSections = buildWebSectionsFromConfig(cfg);
      } catch (_) { /* ignore */ }
    }

    async function init() {
      await loadConfig();
      try {
        const h = await fetch("/health", { cache: "no-store" });
        if (h.ok) {
          const health = await h.json();
          if (health.refresh_seconds) {
            refreshMs = health.refresh_seconds * 1000;
            document.getElementById("refreshSec").textContent = health.refresh_seconds;
          }
        }
      } catch (_) { /* ignore */ }

      await loadQuotes();
      if (timer) clearInterval(timer);
      timer = setInterval(loadQuotes, refreshMs);
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") loadQuotes();
    });

    init();
  </script>
</body>
</html>
